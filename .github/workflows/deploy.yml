name: Deploy VPS

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts
          {
            echo "Host marker-vps"
            echo "  HostName $VPS_HOST"
            echo "  User $VPS_USER"
            echo "  Port $VPS_PORT"
            echo "  IdentityFile ~/.ssh/id_ed25519"
            echo "  StrictHostKeyChecking yes"
          } >> ~/.ssh/config

      - name: Server pull, build, and deploy
        env:
          DEPLOY_REF: ${{ github.ref_name }}
          REPO_URL: https://github.com/${{ github.repository }}.git
        run: |
          ssh marker-vps "
            set -eu
            if [ -x /srv/analitica-src/deploy/server-deploy.sh ]; then
              REPO_URL='$REPO_URL' DEPLOY_REF='$DEPLOY_REF' sh /srv/analitica-src/deploy/server-deploy.sh
            else
              git clone '$REPO_URL' /srv/analitica-src
              cd /srv/analitica-src
              git checkout '$DEPLOY_REF'
              REPO_URL='$REPO_URL' DEPLOY_REF='$DEPLOY_REF' sh deploy/server-deploy.sh
            fi
          "
