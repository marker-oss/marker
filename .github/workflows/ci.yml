name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  clojure-tests:
    runs-on: ubuntu-latest
    container:
      image: clojure:temurin-21-tools-deps-bookworm-slim
    steps:
      - uses: actions/checkout@v4

      - name: Cache Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: clj-${{ hashFiles('deps.edn') }}
          restore-keys: |
            clj-

      - name: Pre-fetch dependencies
        run: clojure -P

      - name: Run unit and integration tests
        run: clojure -M:test

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: docker build -t analitica-ci:${{ github.sha }} .
