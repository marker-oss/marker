name: Deploy

# Auto-deploy to the LAN production host (192.168.2.140) on every push to master.
# Skipped if [skip ci] is in the commit message.
on:
  push:
    branches: [master]

jobs:
  deploy:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: docker
    container:
      image: alpine:latest
    steps:
      - name: Install ssh client
        run: apk add --no-cache openssh-client

      - name: Load deploy key
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: 192.168.2.140
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pull + rebuild + restart
        env:
          DEPLOY_HOST: 192.168.2.140
        run: |
          ssh -i ~/.ssh/id_ed25519 root@"$DEPLOY_HOST" \
            'set -e; \
             cd /opt/analitica; \
             git fetch --all --prune; \
             git reset --hard origin/master; \
             docker compose up -d --build; \
             docker image prune -f --filter "until=24h"; \
             echo "deployed: $(git rev-parse --short HEAD)"'

      - name: Smoke check
        run: |
          apk add --no-cache curl
          # wait up to 90s for healthy container
          for i in $(seq 1 18); do
            if ssh -i ~/.ssh/id_ed25519 root@192.168.2.140 \
                 'curl -sf -o /dev/null http://localhost:3000/'; then
              echo "smoke: OK"; exit 0
            fi
            sleep 5
          done
          echo "smoke: FAILED after 90s"
          ssh -i ~/.ssh/id_ed25519 root@192.168.2.140 \
            'docker compose -f /opt/analitica/docker-compose.yml logs --tail 30'
          exit 1
